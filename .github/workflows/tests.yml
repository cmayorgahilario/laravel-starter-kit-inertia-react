name: Pest (tests + merged coverage)

on:
  workflow_call: {}

jobs:
  tests:
    name: Tests (Shard ${{ matrix.shard }}/5)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sail -d testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_DATABASE: testing
      DB_USERNAME: sail
      DB_PASSWORD: password
      REDIS_HOST: 127.0.0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, dom, fileinfo, pgsql, pdo_pgsql, redis, intl, bcmath, gd, pcov
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Bootstrap app environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate --with-form

      - name: Build frontend assets
        run: bun run build

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun pm ls 2>/dev/null | grep playwright | head -1 | sed 's/.*@//')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests with per-shard coverage
        run: |
          mkdir -p coverage
          php artisan test --shard=${{ matrix.shard }}/5 --coverage-php=coverage/shard-${{ matrix.shard }}.cov

      - name: Upload shard coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage/shard-${{ matrix.shard }}.cov
          retention-days: 1

      - name: Upload browser screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-screenshots-shard-${{ matrix.shard }}
          path: tests/Browser/Screenshots

  merge-coverage:
    name: Merge coverage & enforce 100%
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, dom, fileinfo, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Download all shard coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage
          pattern: coverage-shard-*
          merge-multiple: true

      - name: Merge coverage reports
        run: |
          mkdir -p coverage-report
          vendor/bin/phpcov merge \
            --clover coverage-report/clover.xml \
            --text coverage-report/summary.txt \
            coverage/
          cat coverage-report/summary.txt

      - name: Enforce minimum 100% line coverage
        run: |
          php -r '
            $xml = new SimpleXMLElement(file_get_contents("coverage-report/clover.xml"));
            $metrics = $xml->project->metrics;
            $statements = (int) $metrics["statements"];
            $covered = (int) $metrics["coveredstatements"];
            $percent = $statements > 0 ? ($covered / $statements) * 100 : 0;
            printf("Line coverage: %.2f%% (%d/%d statements)\n", $percent, $covered, $statements);
            if ($percent < 100) {
                fwrite(STDERR, "FAIL: line coverage below 100%\n");
                exit(1);
            }
            echo "OK: 100% line coverage\n";
          '

      - name: Upload merged coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 14
