name: Pest (tests + coverage)

on:
  workflow_call: {}

jobs:
  # NOTE: With matrix.shard = ["1/1"] (default), the GitHub Actions display name becomes
  # "Pest (tests + coverage) (1/1)". Branch protection rules referencing the old exact name
  # "Pest (tests + coverage)" must be updated to the new suffixed name or a glob pattern.
  # Scaling to N shards is a 1-line change: replace ["1/1"] with ["1/N", "2/N", ..., "N/N"].
  pest-coverage:
    name: Pest (tests + coverage)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: ["1/1"]

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sail -d testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_DATABASE: testing
      DB_USERNAME: sail
      DB_PASSWORD: password
      REDIS_HOST: 127.0.0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          # TODO: downgrade to 8.4 if 8.5 is not yet available on setup-php
          php-version: "8.5"
          extensions: mbstring, dom, fileinfo, pgsql, pdo_pgsql, redis, intl, bcmath, gd, pcov
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Bootstrap app environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate --with-form

      - name: Build frontend assets
        run: bun run build

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests with coverage
        run: php artisan test --coverage --min=100 --compact --shard=${{ matrix.shard }}
