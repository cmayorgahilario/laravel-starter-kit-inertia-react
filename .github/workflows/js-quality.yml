name: JS Quality

on:
  workflow_call: {}

jobs:
  oxlint:
    name: oxlint (JS lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, dom, fileinfo, pgsql, pdo_pgsql, redis, intl, bcmath, gd
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Discover packages
        run: php artisan package:discover --ansi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Bootstrap app environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate --with-form

      - name: Run oxlint
        run: bun run test:lint

  tsc:
    name: tsc (type check)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, dom, fileinfo, pgsql, pdo_pgsql, redis, intl, bcmath, gd
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Discover packages
        run: php artisan package:discover --ansi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Bootstrap app environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate --with-form

      - name: Run tsc
        run: bun run test:types

  build:
    name: build (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, dom, fileinfo, pgsql, pdo_pgsql, redis, intl, bcmath, gd
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Discover packages
        run: php artisan package:discover --ansi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Bootstrap app environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Generate Wayfinder types
        run: php artisan wayfinder:generate --with-form

      - name: Run build
        run: bun run build
